<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gowasm counter</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                max-width: 400px;
                margin: 4rem auto;
                padding: 0 1rem;
            }
            .counter button {
                margin: 0 0.25rem;
                padding: 0.4rem 1rem;
                font-size: 1rem;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <script src="/wasm_exec.js"></script>
        <script>
            const go = new Go();
            WebAssembly.instantiateStreaming(
                fetch("/app.wasm"),
                go.importObject,
            ).then((result) => go.run(result.instance));
        </script>
        <!-- livereload -->
    </body>
</html>
