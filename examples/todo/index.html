<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gowasm todo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 2rem 1rem;
    }

    .todoapp {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    header {
      background: #4a90d9;
      padding: 1.5rem;
    }

    header h1 {
      margin: 0 0 1rem;
      color: #fff;
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 2px;
    }

    .todo-input {
      display: flex;
      gap: 0.5rem;
    }

    .todo-input input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
    }

    .todo-input button {
      padding: 0.6rem 1rem;
      background: #fff;
      color: #4a90d9;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    .todo-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid #f0f0f0;
      gap: 0.75rem;
    }

    .todo-item:last-child { border-bottom: none; }

    .todo-item input[type="checkbox"] { cursor: pointer; }

    .todo-text {
      flex: 1;
      font-size: 1rem;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .delete {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 0.25rem;
      line-height: 1;
    }

    .delete:hover { color: #e74c3c; }

    .todo-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-top: 1px solid #f0f0f0;
      font-size: 0.85rem;
      color: #888;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .filters {
      display: flex;
      gap: 0.25rem;
    }

    .filters button {
      background: none;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      color: #555;
      font-size: 0.85rem;
    }

    .filters button.active {
      border-color: #4a90d9;
      color: #4a90d9;
    }

    .clear-completed {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
    }

    .clear-completed:hover { color: #e74c3c; text-decoration: underline; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/wasm_exec.js"></script>
  <script>
    const go = new Go();
    WebAssembly.instantiateStreaming(fetch("/app.wasm"), go.importObject)
      .then(result => go.run(result.instance));
  </script>
  <!-- livereload -->
</body>
</html>
